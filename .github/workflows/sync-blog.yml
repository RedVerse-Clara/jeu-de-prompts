name: Sync Substack Blog

on:
  schedule:
    - cron: '0 6 * * *'  # Chaque jour à 6h UTC
  workflow_dispatch:       # Trigger manuel

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build blog pages from Substack RSS
        run: node scripts/build-blog.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/ sitemap.xml
          git diff --staged --quiet || (git commit -m "sync: update blog from Substack RSS" && git push)
