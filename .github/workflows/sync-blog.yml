name: Sync Substack Blog

on:
  schedule:
    - cron: '0 * * * *'    # Toutes les heures (délai max ~1h après publication)
  workflow_dispatch:        # Trigger manuel (bouton "Run workflow")

# Évite que deux exécutions se chevauchent (cron + manuel en même temps)
concurrency:
  group: sync-blog
  cancel-in-progress: false

permissions:
  contents: write
  issues: write             # Pour ouvrir une issue d'alerte si le sync échoue

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Build blog pages from Substack
        run: |
          for i in 1 2 3; do
            node scripts/build-blog.mjs && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/ sitemap.xml
          git diff --staged --quiet || (git commit -m "sync: update blog from Substack" && git push)

      # ── Alerte en cas d'échec : ouvre (ou réutilise) une issue GitHub ──
      - name: Open alert issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '⚠️ Échec de la synchronisation du blog Substack';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'La synchronisation automatique du blog a échoué.',
              '',
              `**Run concerné :** ${runUrl}`,
              '',
              'Causes fréquentes : API Substack temporairement bloquée ou indisponible.',
              'Le prochain run horaire réessaiera tout seul — aucune action requise si',
              'le run suivant repasse au vert. Si l\'échec persiste, ouvre le run ci-dessus.',
            ].join('\n');

            // Ne pas spammer : réutiliser une issue ouverte existante s'il y en a une
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'sync-blog-failure',
              per_page: 1,
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['sync-blog-failure'],
              });
            }
